$kind: http-request
description: Returns a list of turbulence reports
url: "{{baseUrl}}/turbulence?airportCode=ATL"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: airportCode
    value: ATL
    description: airport code
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "ATL",
            "minLength": 3,
            "maxLength": 4,
            "pattern": "^[A-Z]{3,4}$"
          }
        }
      }
body:
  type: text
  content: ""
examples: ./.resources/Retrieve turbulence report.resources/examples
order: 1000
